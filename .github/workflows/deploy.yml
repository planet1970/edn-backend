name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Create Backend Directory on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: mkdir -p /root/edn/backend

      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "dist/*,package.json,package-lock.json,prisma/*"
          target: "/root/edn/backend"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /root/edn/backend
            # Proje ile ayni Prisma surumunu kullanalim
            npm install --production --legacy-peer-deps
            npx prisma@5.7.0 generate
            
            # Create .env file dynamically
            echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" > .env
            echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> .env
            
            # Restart the application with PM2
            pm2 delete edn-backend || true
            pm2 start dist/main.js --name "edn-backend"
            pm2 save
